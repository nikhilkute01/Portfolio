name: Portfolio

on:
    push:
        branches: [main]
permissions: 
      pages: write
      id-token: write

jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Code
              uses: actions/checkout@v4

            - name: Setup the Github pages
              uses: actions/configure-pages@v4

            - name: Upload Static file
              uses: actions/upload-images-artifact@v4
              
            - name: Deploy to Github pages
              uses: actions/deploy-pages@v4
